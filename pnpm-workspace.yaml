allowBuilds:
  core-js: false
  protobufjs: false

# Supply-chain protection: quarantine third-party packages younger than 7 days.
# These settings MUST live here — pnpm 11 ignores `minimum-release-age*` in .npmrc
# (the lockfile policy check only reads pnpm-workspace.yaml / config.yaml).
minimumReleaseAge: 10080
minimumReleaseAgeExclude:
  - '@rimori/*'
